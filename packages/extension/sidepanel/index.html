<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentBridge</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header -->
  <header class="panel-header">
    <div class="brand">
      <div class="logo-mark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7v10l9 5 9-5V7l-9-5z" stroke="url(#grad)" stroke-width="1.5" fill="none"/>
          <path d="M12 8a4 4 0 100 8 4 4 0 000-8z" stroke="url(#grad)" stroke-width="1.5" fill="none"/>
          <circle cx="12" cy="12" r="1.5" fill="url(#grad)"/>
          <defs>
            <linearGradient id="grad" x1="3" y1="2" x2="21" y2="22">
              <stop offset="0%" stop-color="#00d4aa"/>
              <stop offset="100%" stop-color="#0ea5e9"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="brand-name">AgentBridge</span>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="btn-settings" title="Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M6.5 1.5h3l.5 2 1.5.87 2-.5 1.5 2.6-1.5 1.5v1.73l1.5 1.5-1.5 2.6-2-.5L10 14l-.5 2h-3l-.5-2-1.5-.87-2 .5-1.5-2.6 1.5-1.5V8.27L1 6.77l1.5-2.6 2 .5L6 3.5l.5-2z" stroke="currentColor" stroke-width="1.2"/>
          <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Connection Status -->
  <div class="connection-bar" id="connection-bar">
    <div class="connection-dot"></div>
    <span class="connection-text">Connecting to companion...</span>
  </div>

  <!-- Task Section -->
  <section class="section" id="section-task">
    <!-- Empty state -->
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="6" y="10" width="36" height="28" rx="4" stroke="var(--color-text-tertiary)" stroke-width="1.5"/>
          <path d="M6 18h36" stroke="var(--color-text-tertiary)" stroke-width="1.5"/>
          <circle cx="12" cy="14" r="1.5" fill="var(--color-danger)"/>
          <circle cx="17" cy="14" r="1.5" fill="var(--color-warning)"/>
          <circle cx="22" cy="14" r="1.5" fill="var(--color-success)"/>
          <path d="M16 28l4 4 8-8" stroke="var(--color-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h3 class="empty-title">No Active Task</h3>
      <p class="empty-desc">Create a task to start delegating browser work to your AI agent.</p>
      <button class="btn btn-primary" id="btn-new-task">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        New Task
      </button>
    </div>

    <!-- Active task (hidden by default) -->
    <div class="task-active" id="task-active" style="display: none;">
      <!-- Task Header -->
      <div class="task-header">
        <div class="task-info">
          <h3 class="task-title" id="task-title">—</h3>
          <div class="task-meta">
            <span class="badge badge-mode" id="task-mode">Local Attach</span>
            <span class="badge badge-status" id="task-status">Planning</span>
          </div>
        </div>
        <div class="task-controls">
          <button class="btn-icon btn-pause" id="btn-pause" title="Pause task">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <rect x="2" y="1" width="4" height="12" rx="1" fill="currentColor"/>
              <rect x="8" y="1" width="4" height="12" rx="1" fill="currentColor"/>
            </svg>
          </button>
          <button class="btn-icon btn-stop" id="btn-stop" title="Stop task">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <rect x="2" y="2" width="10" height="10" rx="2" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Agent Info -->
      <div class="agent-bar">
        <div class="agent-avatar">AI</div>
        <div class="agent-details">
          <span class="agent-name" id="agent-name">—</span>
          <span class="agent-provider" id="agent-provider">—</span>
        </div>
      </div>

      <!-- Domain / Origin -->
      <div class="origin-bar">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/>
          <path d="M1.5 7h11M7 1.5c-2 2-2 9 0 11M7 1.5c2 2 2 9 0 11" stroke="currentColor" stroke-width="1"/>
        </svg>
        <span class="origin-text" id="origin-text">—</span>
      </div>

      <!-- Permission Summary -->
      <div class="permissions-section">
        <h4 class="section-label">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M6 1L1.5 3.5v3C1.5 9 3.5 11 6 11s4.5-2 4.5-4.5v-3L6 1z" stroke="currentColor" stroke-width="1.2"/>
            <path d="M4 6l1.5 1.5L8 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Permissions
        </h4>
        <div class="permission-chips" id="permission-chips">
          <span class="chip chip-granted">Read text</span>
          <span class="chip chip-granted">Navigate</span>
          <span class="chip chip-blocked">Submit</span>
          <span class="chip chip-blocked">Download</span>
        </div>
      </div>

      <!-- Risk Indicator -->
      <div class="risk-bar" id="risk-bar">
        <div class="risk-indicator risk-low">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span>Low Risk</span>
        </div>
        <div class="traffic-state" id="traffic-state">
          <span class="traffic-dot traffic-normal"></span>
          Normal
        </div>
      </div>

      <!-- Data State -->
      <div class="data-state-bar" id="data-state-bar">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <rect x="1" y="3" width="10" height="6" rx="1.5" stroke="currentColor" stroke-width="1"/>
          <circle cx="6" cy="6" r="1.5" stroke="currentColor" stroke-width="1"/>
        </svg>
        <span>Local only — no data leaves device</span>
      </div>
    </div>
  </section>

  <!-- Action Feed -->
  <section class="section section-feed" id="section-feed" style="display: none;">
    <h4 class="section-label">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M1 3h10M1 6h7M1 9h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Activity
    </h4>
    <div class="feed-list" id="feed-list">
      <!-- Feed items injected dynamically -->
    </div>
  </section>

  <!-- Receipt Link -->
  <div class="footer-bar" id="footer-bar" style="display: none;">
    <button class="btn btn-ghost btn-sm" id="btn-receipt">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M2 1h8v10l-2-1-2 1-2-1-2 1V1z" stroke="currentColor" stroke-width="1.2"/>
        <path d="M4 4h4M4 6.5h3" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
      </svg>
      View Receipt
    </button>
    <button class="btn btn-ghost btn-sm" id="btn-timeline">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <circle cx="3" cy="3" r="1.5" stroke="currentColor" stroke-width="1"/>
        <circle cx="9" cy="6" r="1.5" stroke="currentColor" stroke-width="1"/>
        <circle cx="3" cy="9" r="1.5" stroke="currentColor" stroke-width="1"/>
        <path d="M4.5 3h3M4.5 9h3" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
      </svg>
      Timeline
    </button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
